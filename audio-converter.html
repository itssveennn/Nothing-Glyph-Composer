<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Converter</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #121212;
            color: #eee;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .top-nav {
            width: 100%;
            max-width: 1050px;
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .top-nav a {
            color: #bbb;
            text-decoration: none;
            font-size: 0.9em;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a1a;
        }
        .top-nav a.active { color: #fff; border-color: #ff3131; }
        .wrap { width: 100%; max-width: 780px; }
        h1 { margin: 8px 0 6px 0; text-align: center; }
        .subtitle { color: #9a9a9a; text-align: center; margin-bottom: 18px; font-size: 0.9em; }
        .card {
            background: #1a1a1a;
            border: 1px solid #323232;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .btn {
            border: 1px solid #555;
            background: #2a2a2a;
            color: #fff;
            border-radius: 8px;
            padding: 10px 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn.primary { background: #ff3131; border-color: #be1d1d; }
        .btn.secondary { background: #24435f; border-color: #365f82; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .status {
            margin-top: 10px;
            background: #111;
            border: 1px solid #2f2f2f;
            border-radius: 8px;
            padding: 10px;
            min-height: 44px;
            font-size: 0.9em;
            color: #ccc;
            white-space: pre-wrap;
        }
        .progress-wrap {
            margin-top: 10px;
            width: 100%;
            background: #111;
            border: 1px solid #2f2f2f;
            border-radius: 8px;
            overflow: hidden;
            height: 12px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff3131, #ff6b6b);
            transition: width 0.2s ease;
        }
        .small { color: #aaa; font-size: 0.83em; margin-top: 8px; line-height: 1.45; }
        .footer { margin-top: 14px; font-size: 0.75em; color: #888; text-align: center; }
        .post-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        code {
            background: #101010;
            border: 1px solid #2f2f2f;
            border-radius: 4px;
            padding: 1px 5px;
            color: #f6f6f6;
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="index.html">Glyph Composer</a>
        <a href="gallery.html">Gallery</a>
        <a href="tutorial.html">Tutorial</a>
        <a class="active" href="audio-converter.html">Audio Converter</a>
    </div>

    <div class="wrap">
        <h1>Audio Converter</h1>
        <div class="subtitle">Convert MP3/M4A/WAV to Ogg Vorbis and download as <code>.ogg</code>.</div>

        <div class="card">
            <div class="row">
                <input id="audioInput" type="file" accept=".mp3,.m4a,.wav,.aac,.flac,.ogg,.opus,audio/*">
                <button id="convertBtn" class="btn primary">Convert to .ogg (Vorbis)</button>
            </div>
            <div class="progress-wrap">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div id="status" class="status">Ready.</div>
            <div class="post-actions">
                <button id="useComposerBtn" class="btn secondary" disabled>Use in Glyph Composer</button>
            </div>
            
        </div>
    </div>

    <div class="footer">&copy; its.sveennn</div>

    <script type="module">
        import { FFmpeg } from "./vendor/ffmpeg/ffmpeg/index.js";
        import { fetchFile } from "./vendor/ffmpeg/util/index.js";

        const input = document.getElementById("audioInput");
        const convertBtn = document.getElementById("convertBtn");
        const useComposerBtn = document.getElementById("useComposerBtn");
        const statusEl = document.getElementById("status");
        const progressBar = document.getElementById("progressBar");
        const PENDING_AUDIO_KEY = "glyphComposerPendingAudioV1";

        const ffmpeg = new FFmpeg();
        let ffmpegLoaded = false;
        let busy = false;

        function setStatus(msg) { statusEl.textContent = msg; }
        function setProgress(fraction) {
            const pct = Math.max(0, Math.min(100, Math.round((Number(fraction) || 0) * 100)));
            progressBar.style.width = `${pct}%`;
        }

        function getBaseName(name) {
            const v = String(name || "");
            const dot = v.lastIndexOf(".");
            return dot > 0 ? v.slice(0, dot) : (v || "converted");
        }

        function uint8ArrayToBase64(bytes) {
            let binary = "";
            const chunk = 0x8000;
            for (let i = 0; i < bytes.length; i += chunk) {
                const part = bytes.subarray(i, i + chunk);
                binary += String.fromCharCode.apply(null, part);
            }
            return btoa(binary);
        }

        async function ensureLoaded() {
            if (ffmpegLoaded) return;
            setStatus("Loading converter core (first time can take a while)...");
            setProgress(0.02);
            const coreURL = new URL("./vendor/ffmpeg/core/ffmpeg-core.js", import.meta.url).href;
            const wasmURL = new URL("./vendor/ffmpeg/core/ffmpeg-core.wasm", import.meta.url).href;
            await ffmpeg.load({ coreURL, wasmURL });
            ffmpegLoaded = true;
            setProgress(0.06);
            setStatus("Converter ready.");
        }

        ffmpeg.on("progress", ({ progress }) => {
            if (busy) {
                setProgress(0.1 + (Math.max(0, Math.min(1, progress || 0)) * 0.88));
            }
        });

        ffmpeg.on("log", ({ message }) => {
            if (!busy) return;
            if (typeof message === "string" && message.trim()) setStatus(message.trim());
        });

        convertBtn.addEventListener("click", async () => {
            if (busy) return;
            const file = input.files && input.files[0];
            if (!file) {
                setStatus("Please choose an audio file first.");
                return;
            }

            busy = true;
            convertBtn.disabled = true;
            setProgress(0);

            try {
                await ensureLoaded();
                const inName = `input_${Date.now()}`;
                const outName = "output.ogg";

                setStatus("Reading input...");
                await ffmpeg.writeFile(inName, await fetchFile(file));

                setStatus("Converting to Ogg Vorbis...");
                await ffmpeg.exec([
                    "-i", inName,
                    "-vn",
                    "-sn",
                    "-dn",
                    "-map_metadata", "-1",
                    "-c:a", "libvorbis",
                    "-ac", "1",
                    "-ar", "48000",
                    "-q:a", "5",
                    "-f", "ogg",
                    outName
                ]);

                setStatus("Preparing download...");
                const data = await ffmpeg.readFile(outName);
                const blob = new Blob([data.buffer], { type: "audio/ogg" });
                const base = getBaseName(file.name);
                const convertedName = `${base}.ogg`;

                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = convertedName;
                a.click();
                URL.revokeObjectURL(a.href);

                try {
                    const b64 = uint8ArrayToBase64(data);
                    sessionStorage.setItem(PENDING_AUDIO_KEY, JSON.stringify({
                        name: convertedName,
                        b64
                    }));
                    useComposerBtn.disabled = false;
                } catch {}

                setProgress(1);
                setStatus("Done. Download started.");

                try { await ffmpeg.deleteFile(inName); } catch {}
                try { await ffmpeg.deleteFile(outName); } catch {}
            } catch (err) {
                setProgress(0);
                const msg = err && err.message ? err.message : String(err);
                if (/Failed to fetch|NetworkError|fetch/i.test(msg)) {
                    setStatus(`Conversion failed: ${msg}\nPlease check internet/adblock/firewall and try again.`);
                } else {
                    setStatus(`Conversion failed: ${msg}`);
                }
            } finally {
                busy = false;
                convertBtn.disabled = false;
            }
        });

        useComposerBtn.addEventListener("click", () => {
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
