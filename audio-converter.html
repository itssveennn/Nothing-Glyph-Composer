<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Converter</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #121212;
            color: #eee;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .top-nav {
            width: 100%;
            max-width: 1050px;
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .top-nav a {
            color: #bbb;
            text-decoration: none;
            font-size: 0.9em;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a1a;
        }
        .top-nav a.active { color: #fff; border-color: #ff3131; }
        .wrap { width: 100%; max-width: 780px; }
        h1 { margin: 8px 0 6px 0; text-align: center; }
        .subtitle { color: #9a9a9a; text-align: center; margin-bottom: 18px; font-size: 0.9em; }
        .card {
            background: #1a1a1a;
            border: 1px solid #323232;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .btn {
            border: 1px solid #555;
            background: #2a2a2a;
            color: #fff;
            border-radius: 8px;
            padding: 10px 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn.primary { background: #ff3131; border-color: #be1d1d; }
        .btn.secondary { background: #24435f; border-color: #365f82; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .status {
            margin-top: 10px;
            background: #111;
            border: 1px solid #2f2f2f;
            border-radius: 8px;
            padding: 10px;
            min-height: 44px;
            font-size: 0.9em;
            color: #ccc;
            white-space: pre-wrap;
        }
        .progress-wrap {
            margin-top: 10px;
            width: 100%;
            background: #111;
            border: 1px solid #2f2f2f;
            border-radius: 8px;
            overflow: hidden;
            height: 12px;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff3131, #ff6b6b);
            transition: width 0.2s ease;
        }
        .small { color: #aaa; font-size: 0.83em; margin-top: 8px; line-height: 1.45; }
        .footer { margin-top: 14px; font-size: 0.75em; color: #888; text-align: center; }
        .post-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
        .edit-grid { display: grid; grid-template-columns: repeat(2, minmax(140px, 1fr)); gap: 8px; margin-top: 10px; }
        .edit-item { display: flex; flex-direction: column; gap: 4px; }
        .edit-item label { font-size: 0.78em; color: #bdbdbd; }
        .edit-item input { width: 100%; border: 1px solid #444; background: #101010; color: #fff; border-radius: 6px; padding: 7px 8px; }
        .wave-wrap { margin-top: 10px; border: 1px solid #2f2f2f; border-radius: 8px; background: #0f0f0f; padding: 8px; }
        .wave-editor { position: relative; width: 100%; }
        #waveCanvas { width: 100%; height: 120px; display: block; border-radius: 6px; background: #090909; }
        .trim-overlay { position: absolute; inset: 0; pointer-events: none; }
        .trim-selection { position: absolute; top: 0; bottom: 0; background: rgba(255,255,255,0.06); border-left: 1px solid rgba(255,255,255,0.35); border-right: 1px solid rgba(255,255,255,0.35); }
        .trim-handle { position: absolute; top: 0; bottom: 0; width: 14px; margin-left: -7px; pointer-events: auto; cursor: ew-resize; background: rgba(255,49,49,0.18); border-left: 1px solid rgba(255,49,49,0.6); border-right: 1px solid rgba(255,49,49,0.6); }
        .dur-row { margin-top: 6px; display: flex; justify-content: space-between; font-size: 0.78em; color: #bdbdbd; }
        #previewAudio { width: 100%; margin-top: 8px; }
        @media (max-width: 760px) { .edit-grid { grid-template-columns: 1fr; } #waveCanvas { height: 96px; } }
        .label-row { display: flex; align-items: center; gap: 6px; }
        .info-btn { width: 18px; height: 18px; border-radius: 50%; border: 1px solid #5b5b5b; background: #1d1d1d; color: #d8d8d8; font-size: 0.7em; line-height: 1; cursor: pointer; padding: 0; }
        .info-tip { display: none; font-size: 0.72em; color: #b7b7b7; line-height: 1.35; margin-top: 2px; }
        .info-tip.show { display: block; }
        code {
            background: #101010;
            border: 1px solid #2f2f2f;
            border-radius: 4px;
            padding: 1px 5px;
            color: #f6f6f6;
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="index.html">Glyph Composer</a>
        <a href="gallery.html">Gallery</a>
        <a href="tutorial.html">Tutorial</a>
        <a class="active" href="audio-converter.html">Audio Converter</a>
    </div>

    <div class="wrap">
        <h1>Audio Converter</h1>
        <div class="subtitle">Convert MP3/M4A/WAV to Ogg Vorbis and download as <code>.ogg</code>.</div>

        <div class="card">
            <div class="row">
                <input id="audioInput" type="file" accept=".mp3,.m4a,.wav,.aac,.flac,.ogg,.opus,audio/*">
                <button id="convertBtn" class="btn primary">Convert to .ogg (Vorbis)</button>
            </div>
            <div class="wave-wrap">
                <div class="wave-editor" id="waveEditor">
                    <canvas id="waveCanvas"></canvas>
                    <div class="trim-overlay">
                        <div id="trimSelection" class="trim-selection"></div>
                        <div id="trimStartHandle" class="trim-handle"></div>
                        <div id="trimEndHandle" class="trim-handle"></div>
                    </div>
                </div>
                <div class="dur-row">
                    <span id="srcDurText">Source: 0.000s</span>
                    <span id="outDurText">Output: 0.000s</span>
                </div>
                <audio id="previewAudio" controls></audio>
            </div>
            <div class="edit-grid">
                <div class="edit-item">
                    <div class="label-row">
                        <label for="trimStartInput">Trim Start (sec)</label>
                        <button type="button" class="info-btn" data-tip="Cuts audio from the beginning. You can also drag the left handle on the waveform.">i</button>
                    </div>
                    <div class="info-tip"></div>
                    <input id="trimStartInput" type="number" min="0" step="0.01" value="0">
                </div>
                <div class="edit-item">
                    <div class="label-row">
                        <label for="trimEndInput">Trim End (sec)</label>
                        <button type="button" class="info-btn" data-tip="Cuts audio from the end. You can also drag the right handle on the waveform.">i</button>
                    </div>
                    <div class="info-tip"></div>
                    <input id="trimEndInput" type="number" min="0" step="0.01" value="0">
                </div>
                <div class="edit-item">
                    <div class="label-row">
                        <label for="appendSilenceInput">Append Silence (sec)</label>
                        <button type="button" class="info-btn" data-tip="Adds silent time after the trimmed audio. Example: 1s audio + 3s silence = 4s output.">i</button>
                    </div>
                    <div class="info-tip"></div>
                    <input id="appendSilenceInput" type="number" min="0" step="0.1" value="0">
                </div>
                <div class="edit-item">
                    <div class="label-row">
                        <label for="volumeInput">Volume (%)</label>
                        <button type="button" class="info-btn" data-tip="100 = original level. Lower reduces loudness, higher amplifies audio.">i</button>
                    </div>
                    <div class="info-tip"></div>
                    <input id="volumeInput" type="number" min="10" max="300" step="1" value="100">
                </div>
            </div>
            <div class="progress-wrap">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div id="status" class="status">Ready.</div>
            <div class="post-actions">
                <button id="useComposerBtn" class="btn secondary" disabled>Use in Glyph Composer</button>
            </div>
            
        </div>
    </div>

    <div class="footer">&copy; its.sveennn</div>

    <script type="module">
        import { FFmpeg } from "./vendor/ffmpeg/ffmpeg/index.js";
        import { fetchFile } from "./vendor/ffmpeg/util/index.js";

        const input = document.getElementById("audioInput");
        const convertBtn = document.getElementById("convertBtn");
        const useComposerBtn = document.getElementById("useComposerBtn");
        const statusEl = document.getElementById("status");
        const progressBar = document.getElementById("progressBar");
        const trimStartInput = document.getElementById("trimStartInput");
        const trimEndInput = document.getElementById("trimEndInput");
        const appendSilenceInput = document.getElementById("appendSilenceInput");
        const volumeInput = document.getElementById("volumeInput");
        const srcDurText = document.getElementById("srcDurText");
        const outDurText = document.getElementById("outDurText");
        const waveCanvas = document.getElementById("waveCanvas");
        const waveEditor = document.getElementById("waveEditor");
        const trimSelection = document.getElementById("trimSelection");
        const trimStartHandle = document.getElementById("trimStartHandle");
        const trimEndHandle = document.getElementById("trimEndHandle");
        const previewAudio = document.getElementById("previewAudio");
        const PENDING_AUDIO_KEY = "glyphComposerPendingAudioV1";

        const ffmpeg = new FFmpeg();
        let ffmpegLoaded = false;
        let busy = false;
        let sourceDurationSec = 0;
        let sourceArrayBuffer = null;
        let waveformPeaks = [];
        let trimDrag = null;

        function setStatus(msg) { statusEl.textContent = msg; }
        function setProgress(fraction) {
            const pct = Math.max(0, Math.min(100, Math.round((Number(fraction) || 0) * 100)));
            progressBar.style.width = `${pct}%`;
        }

        function getBaseName(name) {
            const v = String(name || "");
            const dot = v.lastIndexOf(".");
            return dot > 0 ? v.slice(0, dot) : (v || "converted");
        }

        function uint8ArrayToBase64(bytes) {
            let binary = "";
            const chunk = 0x8000;
            for (let i = 0; i < bytes.length; i += chunk) {
                const part = bytes.subarray(i, i + chunk);
                binary += String.fromCharCode.apply(null, part);
            }
            return btoa(binary);
        }

        function clampNum(v, min, max) {
            const n = Number(v);
            if (!Number.isFinite(n)) return min;
            return Math.max(min, Math.min(max, n));
        }

        function fmtSec(sec) {
            const n = Number(sec) || 0;
            return `${Math.max(0, n).toFixed(3)}s`;
        }

        function getEditSettings() {
            const trimStart = Math.max(0, Number(trimStartInput.value) || 0);
            const trimEnd = Math.max(0, Number(trimEndInput.value) || 0);
            const appendSilence = Math.max(0, Number(appendSilenceInput.value) || 0);
            const volumePct = clampNum(volumeInput.value, 10, 300);
            return { trimStart, trimEnd, appendSilence, volumePct };
        }

        function getEffectiveDurations() {
            const { trimStart, trimEnd, appendSilence } = getEditSettings();
            const usable = Math.max(0, sourceDurationSec - trimStart - trimEnd);
            return { usable, output: usable + appendSilence };
        }

        function renderTrimOverlay() {
            if (!waveEditor || !trimSelection || !trimStartHandle || !trimEndHandle) return;
            const w = Math.max(1, Math.floor(waveEditor.clientWidth));
            if (sourceDurationSec <= 0) {
                trimSelection.style.left = "0px";
                trimSelection.style.width = `${w}px`;
                trimStartHandle.style.left = "0px";
                trimEndHandle.style.left = `${w}px`;
                return;
            }
            const { trimStart, trimEnd } = getEditSettings();
            const startX = Math.max(0, Math.min(w, (trimStart / sourceDurationSec) * w));
            const endX = Math.max(startX, Math.min(w, ((sourceDurationSec - trimEnd) / sourceDurationSec) * w));
            trimSelection.style.left = `${startX}px`;
            trimSelection.style.width = `${Math.max(1, endX - startX)}px`;
            trimStartHandle.style.left = `${startX}px`;
            trimEndHandle.style.left = `${endX}px`;
        }

        function getClientXFromEvent(ev) {
            if (Number.isFinite(ev && ev.clientX)) return ev.clientX;
            if (ev && ev.touches && ev.touches.length) return ev.touches[0].clientX;
            if (ev && ev.changedTouches && ev.changedTouches.length) return ev.changedTouches[0].clientX;
            return null;
        }

        function startTrimDrag(kind, ev) {
            if (sourceDurationSec <= 0) return;
            const x = getClientXFromEvent(ev);
            if (!Number.isFinite(x)) return;
            trimDrag = { kind };
            ev.preventDefault();
        }

        function onTrimDragMove(ev) {
            if (!trimDrag || sourceDurationSec <= 0) return;
            const x = getClientXFromEvent(ev);
            if (!Number.isFinite(x)) return;
            const rect = waveEditor.getBoundingClientRect();
            const rel = Math.max(0, Math.min(rect.width, x - rect.left));
            const time = (rel / Math.max(1, rect.width)) * sourceDurationSec;
            const minGap = 0.01;
            if (trimDrag.kind === "start") {
                const endTime = Math.max(0, sourceDurationSec - (Number(trimEndInput.value) || 0));
                const nextStart = Math.max(0, Math.min(endTime - minGap, time));
                trimStartInput.value = nextStart.toFixed(3);
            } else {
                const startTime = Math.max(0, Number(trimStartInput.value) || 0);
                const nextEndTime = Math.max(startTime + minGap, Math.min(sourceDurationSec, time));
                trimEndInput.value = Math.max(0, sourceDurationSec - nextEndTime).toFixed(3);
            }
            updateDurationUI();
            if (ev.cancelable) ev.preventDefault();
        }

        function onTrimDragEnd() {
            if (!trimDrag) return;
            trimDrag = null;
        }

        function drawWaveform() {
            const width = Math.max(10, Math.floor(waveCanvas.clientWidth));
            const height = Math.max(10, Math.floor(waveCanvas.clientHeight));
            const dpr = window.devicePixelRatio || 1;
            waveCanvas.width = Math.floor(width * dpr);
            waveCanvas.height = Math.floor(height * dpr);
            const ctx = waveCanvas.getContext("2d");
            if (!ctx) return;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "#0a0a0a";
            ctx.fillRect(0, 0, width, height);
            const mid = height / 2;
            ctx.strokeStyle = "#262626";
            ctx.beginPath();
            ctx.moveTo(0, mid);
            ctx.lineTo(width, mid);
            ctx.stroke();

            if (waveformPeaks.length) {
                ctx.strokeStyle = "#b0b0b0";
                const step = width / waveformPeaks.length;
                for (let i = 0; i < waveformPeaks.length; i++) {
                    const amp = Math.max(0, Math.min(1, waveformPeaks[i]));
                    const h = Math.max(1, amp * (height * 0.45));
                    const x = i * step;
                    ctx.beginPath();
                    ctx.moveTo(x, mid - h);
                    ctx.lineTo(x, mid + h);
                    ctx.stroke();
                }
            }

            if (sourceDurationSec > 0) {
                const { trimStart, trimEnd, appendSilence } = getEditSettings();
                const leftCut = Math.min(width, (trimStart / sourceDurationSec) * width);
                const rightCut = Math.min(width, (trimEnd / sourceDurationSec) * width);
                ctx.fillStyle = "rgba(255,49,49,0.18)";
                if (leftCut > 0) ctx.fillRect(0, 0, leftCut, height);
                if (rightCut > 0) ctx.fillRect(width - rightCut, 0, rightCut, height);
                if (appendSilence > 0) {
                    const totalOut = Math.max(0.001, getEffectiveDurations().output);
                    const appendW = (appendSilence / totalOut) * width;
                    ctx.fillStyle = "rgba(80,140,255,0.22)";
                    ctx.fillRect(Math.max(0, width - appendW), 0, appendW, height);
                }
            }
            renderTrimOverlay();
        }

        function updateDurationUI() {
            const { usable, output } = getEffectiveDurations();
            srcDurText.textContent = `Source: ${fmtSec(sourceDurationSec)}`;
            outDurText.textContent = `Output: ${fmtSec(output)}`;
            if (sourceDurationSec > 0 && usable <= 0) {
                setStatus("Trim settings remove the full audio. Please reduce trim.");
            }
            drawWaveform();
        }

        async function analyzeAudioFile(file) {
            sourceArrayBuffer = await file.arrayBuffer();
            previewAudio.src = URL.createObjectURL(file);
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) {
                sourceDurationSec = 0;
                waveformPeaks = [];
                updateDurationUI();
                return;
            }
            const ctx = new Ctx();
            try {
                const decoded = await ctx.decodeAudioData(sourceArrayBuffer.slice(0));
                sourceDurationSec = decoded.duration || 0;
                const ch = decoded.numberOfChannels > 0 ? decoded.getChannelData(0) : null;
                if (ch && ch.length) {
                    const buckets = Math.max(240, Math.min(1800, Math.floor(sourceDurationSec * 220)));
                    const step = Math.max(1, Math.floor(ch.length / buckets));
                    waveformPeaks = new Array(buckets).fill(0);
                    for (let i = 0; i < buckets; i++) {
                        const s = i * step;
                        const e = Math.min(ch.length, s + step);
                        let max = 0;
                        for (let j = s; j < e; j++) {
                            const v = Math.abs(ch[j]);
                            if (v > max) max = v;
                        }
                        waveformPeaks[i] = max;
                    }
                } else {
                    waveformPeaks = [];
                }
            } catch {
                sourceDurationSec = 0;
                waveformPeaks = [];
            } finally {
                if (ctx.state !== "closed") await ctx.close();
            }
            updateDurationUI();
        }

        async function ensureLoaded() {
            if (ffmpegLoaded) return;
            setStatus("Loading converter core (first time can take a while)...");
            setProgress(0.02);
            const coreURL = new URL("./vendor/ffmpeg/core/ffmpeg-core.js", import.meta.url).href;
            const wasmURL = new URL("./vendor/ffmpeg/core/ffmpeg-core.wasm", import.meta.url).href;
            await ffmpeg.load({ coreURL, wasmURL });
            ffmpegLoaded = true;
            setProgress(0.06);
            setStatus("Converter ready.");
        }

        ffmpeg.on("progress", ({ progress }) => {
            if (busy) {
                setProgress(0.1 + (Math.max(0, Math.min(1, progress || 0)) * 0.88));
            }
        });

        ffmpeg.on("log", ({ message }) => {
            if (!busy) return;
            if (typeof message === "string" && message.trim()) setStatus(message.trim());
        });

        convertBtn.addEventListener("click", async () => {
            if (busy) return;
            const file = input.files && input.files[0];
            if (!file) {
                setStatus("Please choose an audio file first.");
                return;
            }

            busy = true;
            convertBtn.disabled = true;
            setProgress(0);

            try {
                await ensureLoaded();
                const inName = `input_${Date.now()}`;
                const outName = "output.ogg";
                const { trimStart, trimEnd, appendSilence, volumePct } = getEditSettings();
                const trimUsable = Math.max(0, sourceDurationSec - trimStart - trimEnd);
                if (sourceDurationSec > 0 && trimUsable <= 0) {
                    throw new Error("Trim settings remove all audio.");
                }
                const af = [];
                if (sourceDurationSec > 0 && (trimStart > 0 || trimEnd > 0)) {
                    const endAt = Math.max(trimStart + 0.001, sourceDurationSec - trimEnd);
                    af.push(`atrim=start=${trimStart.toFixed(3)}:end=${endAt.toFixed(3)}`);
                    af.push("asetpts=PTS-STARTPTS");
                }
                if (appendSilence > 0) af.push(`apad=pad_dur=${appendSilence.toFixed(3)}`);
                if (Math.abs(volumePct - 100) > 0.01) af.push(`volume=${(volumePct / 100).toFixed(3)}`);

                setStatus("Reading input...");
                await ffmpeg.writeFile(inName, await fetchFile(file));

                setStatus("Converting to Ogg Vorbis...");
                const cmd = [
                    "-i", inName,
                    "-vn",
                    "-sn",
                    "-dn",
                    "-map_metadata", "-1",
                ];
                if (af.length) cmd.push("-af", af.join(","));
                cmd.push(
                    "-c:a", "libvorbis",
                    "-ac", "1",
                    "-ar", "48000",
                    "-q:a", "5",
                    "-f", "ogg",
                    outName
                );
                await ffmpeg.exec(cmd);

                setStatus("Preparing download...");
                const data = await ffmpeg.readFile(outName);
                const blob = new Blob([data.buffer], { type: "audio/ogg" });
                const base = getBaseName(file.name);
                const convertedName = `${base}.ogg`;

                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = convertedName;
                a.click();
                URL.revokeObjectURL(a.href);

                try {
                    const b64 = uint8ArrayToBase64(data);
                    sessionStorage.setItem(PENDING_AUDIO_KEY, JSON.stringify({
                        name: convertedName,
                        b64
                    }));
                    useComposerBtn.disabled = false;
                } catch {}

                setProgress(1);
                setStatus("Done. Download started.");

                try { await ffmpeg.deleteFile(inName); } catch {}
                try { await ffmpeg.deleteFile(outName); } catch {}
            } catch (err) {
                setProgress(0);
                const msg = err && err.message ? err.message : String(err);
                if (/Failed to fetch|NetworkError|fetch/i.test(msg)) {
                    setStatus(`Conversion failed: ${msg}\nPlease check internet/adblock/firewall and try again.`);
                } else {
                    setStatus(`Conversion failed: ${msg}`);
                }
            } finally {
                busy = false;
                convertBtn.disabled = false;
            }
        });

        useComposerBtn.addEventListener("click", () => {
            window.location.href = "index.html";
        });

        input.addEventListener("change", async () => {
            const file = input.files && input.files[0];
            useComposerBtn.disabled = true;
            if (!file) {
                sourceDurationSec = 0;
                sourceArrayBuffer = null;
                waveformPeaks = [];
                previewAudio.removeAttribute("src");
                previewAudio.load();
                updateDurationUI();
                return;
            }
            setStatus("Analyzing audio...");
            try {
                await analyzeAudioFile(file);
                setStatus("Audio loaded. Edit settings and convert.");
            } catch (err) {
                setStatus(`Could not analyze audio: ${err && err.message ? err.message : String(err)}`);
            }
        });

        [trimStartInput, trimEndInput, appendSilenceInput, volumeInput].forEach((el) => {
            el.addEventListener("input", updateDurationUI);
        });

        document.querySelectorAll(".info-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
                const item = btn.closest(".edit-item");
                const tip = item ? item.querySelector(".info-tip") : null;
                if (!tip) return;
                const text = btn.getAttribute("data-tip") || "";
                const show = !tip.classList.contains("show");
                document.querySelectorAll(".info-tip.show").forEach((el) => el.classList.remove("show"));
                if (show) {
                    tip.textContent = text;
                    tip.classList.add("show");
                }
            });
        });

        trimStartHandle.addEventListener("mousedown", (ev) => startTrimDrag("start", ev));
        trimEndHandle.addEventListener("mousedown", (ev) => startTrimDrag("end", ev));
        trimStartHandle.addEventListener("touchstart", (ev) => startTrimDrag("start", ev), { passive: false });
        trimEndHandle.addEventListener("touchstart", (ev) => startTrimDrag("end", ev), { passive: false });
        window.addEventListener("mousemove", onTrimDragMove);
        window.addEventListener("mouseup", onTrimDragEnd);
        window.addEventListener("touchmove", onTrimDragMove, { passive: false });
        window.addEventListener("touchend", onTrimDragEnd);
        window.addEventListener("touchcancel", onTrimDragEnd);

        window.addEventListener("resize", () => { drawWaveform(); renderTrimOverlay(); });
        updateDurationUI();
    </script>
</body>
</html>
